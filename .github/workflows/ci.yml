name: Validate, build, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, build, and containerize
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test and build application
        run: npm test

      - name: Build Docker image
        run: docker build --tag flowerzc-blog:${{ github.sha }} .

  deploy:
    name: Deploy to VPS
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /opt/stacks/blog
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Waiting for blog to become ready..."
            for attempt in $(seq 1 30); do
              status="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000 || true)"
              if [ "$status" = "200" ]; then
                echo "Health check passed on attempt $attempt."
                exit 0
              fi
              echo "Attempt $attempt/30: HTTP ${status:-unavailable}; retrying in 2 seconds..."
              sleep 2
            done

            echo "Health check failed after 60 seconds."
            docker compose ps
            docker compose logs --tail=100 blog
            exit 1
