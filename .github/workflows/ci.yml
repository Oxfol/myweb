name: Validate, build, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, build, and containerize
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build --tag flowerzc-blog:${{ github.sha }} .

  deploy:
    name: Deploy to VPS
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/stacks/blog
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
            curl -fsS http://127.0.0.1:3000
            status="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000)"
            if [ "$status" != "200" ]; then
              echo "Health check failed: expected HTTP 200, got $status"
              exit 1
            fi
